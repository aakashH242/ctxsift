name: Docs CI

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "benchmark/results/viewer.html"
      - "docs/src/pages/benchmark-viewer.html.ts"
  pull_request:
    paths:
      - "docs/**"
      - "benchmark/results/viewer.html"
      - "docs/src/pages/benchmark-viewer.html.ts"

concurrency:
  group: docs-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro check
        run: pnpm astro check

      - name: Build docs
        run: pnpm build

      - name: Verify sitemap and robots output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/robots.txt
          test -f dist/llms.txt
          test -f dist/llms-full.txt
          test -f dist/llms-small.txt
          test -f dist/sitemap-index.xml
