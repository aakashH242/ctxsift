name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "benchmark/results/viewer.html"
      - "docs/src/pages/benchmark-viewer.html.ts"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "benchmark/results/viewer.html"
      - "docs/src/pages/benchmark-viewer.html.ts"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run lint
        run: uv run python -c "from ctxsift.dev import lint; raise SystemExit(lint())"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run pytest --cov=src/ctxsift --cov-report=term-missing --cov-fail-under=80
