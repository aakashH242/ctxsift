name: Cut Docs Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the docs-v prefix, for example 0.1.0'
        required: true
        type: string
      target_ref:
        description: 'Branch or commit to release from'
        required: true
        default: 'main'
        type: string
      latest:
        description: 'Also push the container image as latest'
        required: true
        default: true
        type: boolean

concurrency:
  group: cut-docs-release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      VERSION: ${{ github.event.inputs.version }}
      TARGET_REF: ${{ github.event.inputs.target_ref }}
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ctxsift-docs
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Capture release commit
        id: release_commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          tag="docs-v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=docs-v${{ env.VERSION }}
            type=raw,value=sha-${{ steps.release_commit.outputs.sha }}
            type=raw,value=latest,enable=${{ github.event.inputs.latest == 'true' }}

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="docs-v${VERSION}"
          git tag "$tag"
          git push origin "$tag"

      - name: Create GitHub release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="docs-v${VERSION}"
          gh release create "$tag" \
            --target "${TARGET_REF}" \
            --title "$tag" \
            --generate-notes
