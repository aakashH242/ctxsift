name: Python Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: python-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package_version.outputs.value }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Read package version
        id: package_version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"value={data['project']['version']}")
          PY

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="${{ steps.package_version.outputs.value }}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version ($tag_version) does not match pyproject version ($package_version)."
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Check built metadata
        run: python -m pip install --upgrade twine && python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/ctxsift
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release with auto-generated notes
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        env:
          PACKAGE_VERSION: ${{ needs.build.outputs.package_version }}
        with:
          script: |
            const body = [
              "Install from PyPI:",
              "",
              "```bash",
              `uv tool install "ctxsift==${process.env.PACKAGE_VERSION}"`,
              "```",
              "",
              "If `ctxsift` is not found after installation, run:",
              "",
              "```bash",
              "uv tool update-shell",
              "```",
            ].join("\n");

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace("refs/tags/", ""),
              name: context.ref.replace("refs/tags/", ""),
              body,
              generate_release_notes: true,
              make_latest: "legacy",
            });
