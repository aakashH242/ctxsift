name: Python Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to backfill into CHANGELOG.md (for example, v1.0.5)
        required: true
        type: string

concurrency:
  group: python-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package_version.outputs.value }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Read package version
        id: package_version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"value={data['project']['version']}")
          PY

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="${{ steps.package_version.outputs.value }}"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version ($tag_version) does not match pyproject version ($package_version)."
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Check built metadata
        run: python -m pip install --upgrade twine && python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    environment:
      name: pypi
      url: https://pypi.org/p/ctxsift
    steps:
      - name: Check out repository default branch
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Build changelog
        if: startsWith(github.ref, 'refs/tags/v')
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          mode: PR
          configurationJson: |
            {
              "template": "## What's Changed\n\n#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}} by @#{{AUTHOR}} in ##{{NUMBER}}",
              "empty_template": "- No changes"
            }

      - name: Update CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_NOTES: ${{ steps.build_changelog.outputs.changelog }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path("CHANGELOG.md")
          tag = os.environ["RELEASE_TAG"]
          notes = os.environ["RELEASE_NOTES"].strip()
            try:
              release_date = subprocess.check_output(
                ["git", "log", "-1", "--format=%cs", f"refs/tags/{tag}"],
                text=True,
              ).strip()
            except subprocess.CalledProcessError:
              release_date = datetime.now(timezone.utc).date().isoformat()
          header = "# Changelog\n\nThis file is updated automatically after tagged Python releases are published to PyPI.\n\n"

          if path.exists():
              existing = path.read_text(encoding="utf-8")
          else:
              existing = header

          if f"## {tag}\n" in existing or f"## {tag} - " in existing:
              raise SystemExit(0)

          body_start = existing
          if existing.startswith("# Changelog"):
              first_blank = existing.find("\n\n")
              if first_blank != -1:
                  second_blank = existing.find("\n\n", first_blank + 2)
                  if second_blank != -1:
                      body_start = existing[second_blank + 2 :].lstrip()
                  else:
                      body_start = ""

            entry = f"## {tag} - {release_date}\n\n{notes}\n"
          new_text = header + entry
          if body_start:
              new_text += "\n" + body_start

          path.write_text(new_text, encoding="utf-8")
          PY

      - name: Create GitHub release with auto-generated notes
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v9.0.0
        env:
          PACKAGE_VERSION: ${{ needs.build.outputs.package_version }}
          RELEASE_NOTES: ${{ steps.build_changelog.outputs.changelog }}
        with:
          script: |
            const body = [
              "Install from PyPI:",
              "",
              "```bash",
              `uv tool install "ctxsift==${process.env.PACKAGE_VERSION}"`,
              "```",
              "",
              "If `ctxsift` is not found after installation, run:",
              "",
              "```bash",
              "uv tool update-shell",
              "```",
              "",
              "---",
              "",
              process.env.RELEASE_NOTES,
            ].join("\n");

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace("refs/tags/", ""),
              name: context.ref.replace("refs/tags/", ""),
              body,
              generate_release_notes: false,
              make_latest: "legacy",
            });

      - name: Open changelog pull request
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/changelog-${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true
          commit-message: "docs: update changelog for ${{ github.ref_name }} [skip ci]"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: "docs: update changelog for ${{ github.ref_name }}"
          body: |
            This automated PR updates CHANGELOG.md for `${{ github.ref_name }}` after the PyPI release workflow published the release.

            The changelog body uses the same generated release notes that were used for the GitHub release.
          add-paths: |
            CHANGELOG.md

  changelog-backfill:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository default branch
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate release tag exists
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null

      - name: Build changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          mode: PR
          toTag: ${{ github.event.inputs.release_tag }}
          configurationJson: |
            {
              "template": "## What's Changed\n\n#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}} by @#{{AUTHOR}} in ##{{NUMBER}}",
              "empty_template": "- No changes"
            }

      - name: Update CHANGELOG.md
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          RELEASE_NOTES: ${{ steps.build_changelog.outputs.changelog }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path("CHANGELOG.md")
          tag = os.environ["RELEASE_TAG"]
          notes = os.environ["RELEASE_NOTES"].strip()
          try:
              release_date = subprocess.check_output(
                  ["git", "log", "-1", "--format=%cs", f"refs/tags/{tag}"],
                  text=True,
              ).strip()
          except subprocess.CalledProcessError:
              release_date = datetime.now(timezone.utc).date().isoformat()
          header = "# Changelog\n\nThis file is updated automatically after tagged Python releases are published to PyPI.\n\n"

          if path.exists():
              existing = path.read_text(encoding="utf-8")
          else:
              existing = header

          if f"## {tag}\n" in existing or f"## {tag} - " in existing:
              raise SystemExit(0)

          body_start = existing
          if existing.startswith("# Changelog"):
              first_blank = existing.find("\n\n")
              if first_blank != -1:
                  second_blank = existing.find("\n\n", first_blank + 2)
                  if second_blank != -1:
                      body_start = existing[second_blank + 2 :].lstrip()
                  else:
                      body_start = ""

          entry = f"## {tag} - {release_date}\n\n{notes}\n"
          new_text = header + entry
          if body_start:
              new_text += "\n" + body_start

          path.write_text(new_text, encoding="utf-8")
          PY

      - name: Open changelog pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/changelog-${{ github.event.inputs.release_tag }}
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true
          commit-message: "docs: update changelog for ${{ github.event.inputs.release_tag }} [skip ci]"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: "docs: update changelog for ${{ github.event.inputs.release_tag }}"
          body: |
            This automated PR backfills CHANGELOG.md for `${{ github.event.inputs.release_tag }}` without re-publishing the package.

            The changelog body uses the same generated release note format as the tagged Python release workflow.
          add-paths: |
            CHANGELOG.md
